# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:
    finnhub.base_url: '%env(string:FINNHUB_BASE_URL)%'
    finnhub.token: '%env(string:FINNHUB_TOKEN)%'

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name

    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Enum/'

    App\Security\ApiKeyAuthenticator:
        arguments:
            $jwtSecret: '%env(JWT_SECRET)%'

    App\Security\TokenManager:
        arguments:
            $jwtSecret: '%env(JWT_SECRET)%'
            $accessTtl: '%env(JWT_ACCESS_TTL)%'
            $refreshTtl: '%env(JWT_REFRESH_TTL)%'

    # Region Subscriber
    App\EventSubscriber\RateLimitSubscriber:
        arguments:
            $loginLimiter: '@limiter.login'
            $loginIpLimiter: '@limiter.login_ip'
            $registerLimiter: '@limiter.register'
            $generalApiLimiter: '@limiter.general_api'
        tags:
            - { name: 'kernel.event_subscriber' }
    # End of Region Subscriber

    # Region Controller
    App\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']
        autowire: true
        autoconfigure: true
    # End of Region Controller

    # Region Notification
    App\Notification\:
        resource: '../src/Notification'
        exclude:
            - '../src/Notification/NotificationDispatcher.php'
            - '../src/Notification/NotificationInterface.php'
        tags: ['app.notification']
    # End of Region Notification

    # Region Services
    App\Service\Finnhub\:
        resource: '../src/Service/Finnhub/'

    App\Service\Finnhub\Provider\FinnhubClient:
        arguments:
            $baseUrl: '%finnhub.base_url%'
            $token: '%finnhub.token%'

    App\Service\Finnhub\Provider\FinnhubClientInterface:
        alias: App\Service\Finnhub\Provider\FinnhubClient
    # End of Region Services

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
